name: Maven Test on Pull Request

on:
  pull_request:
    branches:
      - main  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Java JDK
      uses: actions/setup-java@v4.5.0
      with:
        distribution: 'openjdk' 
        java-version: '17'       

    - name: Run Maven tests
      run: mvn test
